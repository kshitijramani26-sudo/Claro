# Claro — local dev stack (backend phase). Use if NOT using hosted Supabase.
# Brings up Postgres + the FastAPI api.
version: "3.9"
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: claro
    ports:
      - "5432:5432"
    volumes:
      - claro_pgdata:/var/lib/postgresql/data
      - ../database/migrations:/docker-entrypoint-initdb.d:ro
  api:
    build: ../services/api
    env_file: ../services/api/.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/claro
    depends_on: [db]
    ports: ["8000:8000"]
volumes:
  claro_pgdata:
